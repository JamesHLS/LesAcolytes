about_heading: "About the ensemble"
about_text: |
  Les Acolytes is a specialist early-music ensemble showcasing the talents
  of young early-music professionals, performing French repertoire of the
  seventeenth and eighteenth centuries — from cantatas by Clérambault and
  Montéclair to instrumental works by Couperin and Francoeur.

  Founded at Girton College, Cambridge, by harpsichordist and continuo
  player Edward Campbell-Rowntree, the ensemble brings together
  historically-informed performance with the energy of a new generation of
  period-instrument specialists. [Placeholder — expand with more on the
